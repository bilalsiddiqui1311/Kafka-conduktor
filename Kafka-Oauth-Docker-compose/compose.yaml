name: kafka-oauth-local

services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: local-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: CONTROLLER://localhost:9091,HOST://0.0.0.0:9092,DOCKER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,HOST:PLAINTEXT,DOCKER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9091
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  keycloak:
    image: quay.io/keycloak/keycloak:26.6.1
    container_name: local-keycloak
    command: ["start-dev", "--import-realm"]
    ports:
      - "8081:8081"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN_USER:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_HTTP_ENABLED: "true"
      KC_HTTP_PORT: 8081
      KC_HOSTNAME: http://keycloak.localhost:8081
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    volumes:
      - ./keycloak/devops-realm.json:/opt/keycloak/data/import/devops-realm.json:ro
    networks:
      default:
        aliases:
          - keycloak.localhost
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -lc \"exec 3<>/dev/tcp/127.0.0.1/8081; printf 'GET /realms/devops/.well-known/openid-configuration HTTP/1.1\\r\\nHost: keycloak.localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3; grep -q '200 OK' <&3\""
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  kafka-init:
    image: apache/kafka:3.9.1
    container_name: local-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/sh
      - -c
      - |
        /opt/kafka/bin/kafka-topics.sh \
          --bootstrap-server kafka:9093 \
          --create \
          --if-not-exists \
          --topic local.dev.events \
          --partitions 1 \
          --replication-factor 1
    restart: "no"

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: local-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    ports:
      - "8082:8080"
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: file:/etc/kafkaui/config.yml
      LOGGING_LEVEL_ROOT: INFO
    volumes:
      - ./kafka-ui/config.yml:/etc/kafkaui/config.yml:ro
    restart: unless-stopped
